<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password | Post Discharge Care</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #eef2f7;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .logo { font-size: 3rem; margin-bottom: 10px; }
        h2 { color: #1a3c5e; font-size: 1.6rem; margin-bottom: 6px; }
        .subtitle {
            color: #6c757d; font-size: 0.88rem; margin-bottom: 24px;
        }
        .input-group {
            position: relative; margin-bottom: 20px; text-align: left;
        }
        .input-group input {
            width: 100%; padding: 14px 44px 6px 14px;
            border: 2px solid #dee2e6; border-radius: 8px;
            font-size: 0.95rem; outline: none;
            transition: border-color 0.3s; background: transparent;
        }
        .input-group input:focus { border-color: #2c7be5; }
        .input-group label {
            position: absolute; top: 50%; left: 14px;
            transform: translateY(-50%); font-size: 0.9rem;
            color: #6c757d; pointer-events: none; transition: all 0.2s;
        }
        .input-group input:focus + label,
        .input-group input:not(:placeholder-shown) + label {
            top: 8px; font-size: 0.72rem; color: #2c7be5;
        }
        .toggle-eye {
            position: absolute; right: 12px; top: 50%;
            transform: translateY(-50%);
            cursor: pointer; font-size: 1.1rem;
        }
        .btn-login {
            width: 100%; padding: 13px;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white; border: none; border-radius: 8px;
            font-size: 1rem; font-weight: bold; cursor: pointer;
            transition: opacity 0.2s; margin-top: 6px;
        }
        .btn-login:hover { opacity: 0.9; }
        .register-link {
            margin-top: 18px; font-size: 0.88rem; color: #6c757d;
        }
        .register-link a {
            color: #2c7be5; text-decoration: none; font-weight: 600;
        }
        .register-link a:hover { text-decoration: underline; }
        .popup {
            padding: 12px 16px; border-radius: 8px;
            margin-bottom: 16px; font-size: 0.88rem;
            font-weight: 500; text-align: left;
        }
        .popup.success {
            background: #d4edda; color: #155724; border: 1px solid #c3e6cb;
        }
        .popup.error {
            background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;
        }
        .strength-bar {
            height: 5px; border-radius: 4px; margin-top: 6px;
            background: #dee2e6; overflow: hidden;
        }
        .strength-fill {
            height: 100%; width: 0%; border-radius: 4px;
            transition: width 0.3s, background 0.3s;
        }
        .strength-label {
            font-size: 0.75rem; margin-top: 4px; text-align: left;
        }
        small.caps {
            font-size: 12px; color: #e74c3c; display: none;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-card">

        <div class="logo">🔑</div>
        <h2>Reset Password</h2>
        <p class="subtitle">Enter your new password below</p>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="popup {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- Reset Password Form -->
        <form method="POST" action="/reset-password/{{ token }}"
              onsubmit="return validatePasswords()">

            <!-- New Password -->
            <div class="input-group">
                <input type="password" name="password" id="newPassword"
                       placeholder=" " required
                       oninput="checkStrength(this.value)"
                       onkeyup="capsCheck(event)">
                <label>New Password</label>
                <span class="toggle-eye"
                      onclick="togglePassword('newPassword', this)">👁️</span>
                <!-- Strength Bar -->
                <div class="strength-bar">
                    <div class="strength-fill" id="strengthFill"></div>
                </div>
                <div class="strength-label" id="strengthLabel"></div>
                <small class="caps" id="capsWarning1">⚠ Caps Lock is ON</small>
            </div>

            <!-- Confirm Password -->
            <div class="input-group">
                <input type="password" name="confirm_password"
                       id="confirmPassword" placeholder=" " required
                       onkeyup="matchCheck(); capsCheck2(event)">
                <label>Confirm New Password</label>
                <span class="toggle-eye"
                      onclick="togglePassword('confirmPassword', this)">👁️</span>
                <small id="matchMsg"
                       style="font-size:12px; display:none;"></small>
                <small class="caps" id="capsWarning2">⚠ Caps Lock is ON</small>
            </div>

            <button type="submit" class="btn-login">
                ✅ Reset Password
            </button>
        </form>

        <p class="register-link">
            <a href="/">← Back to Login</a>
        </p>

    </div>
</div>

<script>
// Toggle password visibility
function togglePassword(inputId, eye) {
    const input = document.getElementById(inputId);
    input.type      = input.type === "password" ? "text" : "password";
    eye.textContent = input.type === "password" ? "👁️" : "🙈";
}

// Password strength checker
function checkStrength(val) {
    const fill  = document.getElementById("strengthFill");
    const label = document.getElementById("strengthLabel");
    let strength = 0;

    if (val.length >= 8)              strength++;
    if (/[A-Z]/.test(val))            strength++;
    if (/[0-9]/.test(val))            strength++;
    if (/[^A-Za-z0-9]/.test(val))     strength++;

    const configs = [
        { width: "0%",   color: "#dee2e6", text: "" },
        { width: "25%",  color: "#e74c3c", text: "Weak" },
        { width: "50%",  color: "#f39c12", text: "Fair" },
        { width: "75%",  color: "#2c7be5", text: "Good" },
        { width: "100%", color: "#27ae60", text: "Strong ✅" },
    ];

    fill.style.width      = configs[strength].width;
    fill.style.background = configs[strength].color;
    label.textContent     = configs[strength].text;
    label.style.color     = configs[strength].color;
}

// Password match checker
function matchCheck() {
    const pwd  = document.getElementById("newPassword").value;
    const cpwd = document.getElementById("confirmPassword").value;
    const msg  = document.getElementById("matchMsg");

    if (cpwd.length === 0) {
        msg.style.display = "none";
        return;
    }
    msg.style.display = "block";
    if (pwd === cpwd) {
        msg.textContent  = "✅ Passwords match";
        msg.style.color  = "#27ae60";
    } else {
        msg.textContent  = "❌ Passwords do not match";
        msg.style.color  = "#e74c3c";
    }
}

// Validate before submit
function validatePasswords() {
    const pwd  = document.getElementById("newPassword").value;
    const cpwd = document.getElementById("confirmPassword").value;

    if (pwd.length < 6) {
        alert("⚠️ Password must be at least 6 characters.");
        return false;
    }
    if (pwd !== cpwd) {
        alert("❌ Passwords do not match!");
        return false;
    }
    return true;
}

// Caps Lock warnings
function capsCheck(e) {
    document.getElementById("capsWarning1").style.display =
        e.getModifierState("CapsLock") ? "block" : "none";
}
function capsCheck2(e) {
    document.getElementById("capsWarning2").style.display =
        e.getModifierState("CapsLock") ? "block" : "none";
}

// Auto hide flash messages
setTimeout(() => {
    document.querySelectorAll('.popup').forEach(el => {
        el.style.transition = 'opacity 0.5s';
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 500);
    });
}, 4000);
</script>

</body>
</html>
