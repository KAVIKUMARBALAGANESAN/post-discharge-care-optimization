<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prediction Result</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .result-card {
            background: #fff;
            width: 100%;
            max-width: 520px;
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            animation: fadeIn 0.6s ease;
        }

        .result-card h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .risk-badge {
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .low { background: #eafaf1; color: #2ecc71; }
        .medium { background: #fff4e5; color: #f39c12; }
        .high { background: #fdecea; color: #e74c3c; }

        .section {
            margin-bottom: 22px;
        }

        .section h4 {
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .progress-bar {
            width: 100%;
            background: #eee;
            border-radius: 10px;
            overflow: hidden;
            height: 12px;
        }

        .progress {
            height: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            width: {{ prob }}%;
            transition: width 0.6s ease;
        }

        .prob-text {
            margin-top: 6px;
            font-size: 14px;
            color: #666;
            text-align: right;
        }

        .care-plan {
            background: #f8f9ff;
            padding: 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            color: #444;
        }

        /* Approval Status */
        .status-box {
            background: #f1f3f6;
            padding: 14px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            text-align: center;
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-back { background: #e0e0e0; }
        .btn-print { background: #667eea; color: white; }

        .btn-print:hover { opacity: 0.9; }
        .btn-back:hover { background: #d5d5d5; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<div class="result-card">
    <h2>Prediction Result</h2>

    <!-- Risk -->
    <div class="risk-badge 
        {% if risk == 'Low' %}low{% elif risk == 'Medium' %}medium{% else %}high{% endif %}">
        Risk Level: {{ risk }}
    </div>

    <!-- Probability -->
    <div class="section">
        <h4>Risk Probability</h4>
        <div class="progress-bar">
            <div class="progress"></div>
        </div>
        <div class="prob-text">{{ prob }}%</div>
    </div>

    <!-- Care Plan -->
    <div class="section">
        <h4>Recommended Care Plan</h4>
        <div class="care-plan">
            {{ plan }}
        </div>
    </div>

    <!-- Approval Status (READ ONLY) -->
    <div class="section">
        <h4>Discharge / Approval Status</h4>
        <div class="status-box">
            {{ approval_status }}
        </div>
    </div>

    <!-- Actions -->
    <div class="actions">
        <button class="btn btn-back" onclick="window.location.href='/dashboard'">
            Back to Dashboard
        </button>
        <button class="btn btn-print" onclick="window.print()">
            Print / Save
        </button>
    </div>
</div>

</body>
</html>
