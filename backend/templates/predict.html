<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Predict Readmission Risk</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        .predict-card {
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
            animation: fadeIn 0.6s ease;
        }

        .predict-card h2 {
            text-align: center;
            margin-bottom: 8px;
            color: #333;
        }

        .predict-card p {
            text-align: center;
            font-size: 14px;
            color: #777;
            margin-bottom: 22px;
        }

        .hint {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-secondary {
            width: 100%;
            padding: 12px;
            background: #e0e0e0;
            border: none;
            border-radius: 8px;
            color: #333;
            font-size: 15px;
            cursor: pointer;
        }

        .btn-secondary:hover {
            background: #d5d5d5;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="predict-card">

        <h2>🧠 Predict Readmission Risk</h2>
        <p>Enter patient medical details to assess risk level</p>

        <form method="post" onsubmit="showLoading()">

            <!-- ✅ PATIENT ID (NEW – DOCTOR ONLY) -->
            <div class="input-group">
                <input type="text" name="patient_id" placeholder="PAT-0001" required>
                <label>Patient ID</label>
                <div class="hint">Enter the Patient Login ID (e.g. PAT-0001)</div>
            </div>

            <div class="input-group">
                <input type="number" name="age" min="1" max="120" required>
                <label>Age</label>
                <div class="hint">Patient age in years</div>
            </div>

            <div class="input-group">
                <select name="gender" required style="width:100%; padding:12px; border-radius:8px;">
                    <option value="">Select Gender</option>
                    <option value="1">Male</option>
                    <option value="0">Female</option>
                </select>
                <div class="hint">Male = 1, Female = 0</div>
            </div>

            <div class="input-group">
                <input type="number" name="time_in_hospital" min="0" required>
                <label>Hospital Days</label>
                <div class="hint">Total days admitted</div>
            </div>

            <div class="input-group">
                <input type="number" name="inpatient" min="0" required>
                <label>Inpatient Visits</label>
                <div class="hint">Previous inpatient admissions</div>
            </div>

            <div class="input-group">
                <input type="number" name="emergency" min="0" required>
                <label>Emergency Visits</label>
                <div class="hint">Emergency visits count</div>
            </div>

            <div class="input-group">
                <input type="number" name="diagnoses" min="0" required>
                <label>Diagnoses Count</label>
                <div class="hint">Number of diagnoses</div>
            </div>

            <button type="submit" class="btn-login" id="predictBtn">
                🔍 Predict Risk
            </button>

            <div class="btn-group">
                <a href="/dashboard" class="btn-secondary" style="text-align:center; text-decoration:none;">
                    ⬅ Back to Dashboard
                </a>
            </div>
        </form>

    </div>
</div>

<script>
function showLoading() {
    const btn = document.getElementById("predictBtn");
    btn.textContent = "⏳ Predicting...";
    btn.disabled = true;
}
</script>

</body>
</html>
